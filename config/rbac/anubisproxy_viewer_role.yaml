# This rule is not used by the project anubis-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to anubis.techaro.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: anubis-operator
    app.kubernetes.io/managed-by: kustomize
  name: anubisproxy-viewer-role
rules:
- apiGroups:
  - anubis.techaro.dev
  resources:
  - anubisproxies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - anubis.techaro.dev
  resources:
  - anubisproxies/status
  verbs:
  - get
