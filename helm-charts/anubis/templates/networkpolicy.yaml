{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "anubis.fullname" . }}
  labels:
    {{- include "anubis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "anubis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.anubis.port }}
    {{- if and .Values.anubis.metrics.enabled .Values.networkPolicy.metrics.from }}
    - from:
        {{- toYaml .Values.networkPolicy.metrics.from | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .Values.anubis.metrics.port }}
    {{- end }}
{{- end }}
